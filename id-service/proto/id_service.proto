syntax = "proto3";

package idservice;

option go_package = "github.com/quantara/id-service/proto;idservice";

// IDService provides unique ID generation
service IDService {
  // GetID returns a single unique ID
  rpc GetID(GetIDRequest) returns (GetIDResponse);

  // GetBatchID returns a batch of unique IDs
  rpc GetBatchID(GetBatchIDRequest) returns (GetBatchIDResponse);
}

message GetIDRequest {}

message GetIDResponse {
  int64 id = 1;
}

message GetBatchIDRequest {
  int32 batch_size = 1;
}

message GetBatchIDResponse {
  repeated int64 ids = 1;
}
