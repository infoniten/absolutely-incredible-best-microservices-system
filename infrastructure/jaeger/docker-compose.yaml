version: '3.8'

services:
  jaeger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "14268:14268"  # Jaeger HTTP Thrift
      - "14250:14250"  # Jaeger gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - quantara-network

networks:
  quantara-network:
    driver: bridge
