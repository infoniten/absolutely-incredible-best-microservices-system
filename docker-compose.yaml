services:
  # Infrastructure
  postgres:
    build:
      context: ./infrastructure/postgres
      dockerfile: Dockerfile
    container_name: quantara-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantara
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantara-network

  jaeger:
    build:
      context: ./infrastructure/jaeger
      dockerfile: Dockerfile
    container_name: quantara-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - quantara-network

  redis:
    image: redis:7-alpine
    container_name: quantara-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantara-network

  # Microservices
  id-service:
    build:
      context: ./id-service
      dockerfile: Dockerfile
    container_name: quantara-id-service
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/quantara?sslmode=disable"
      ID_POOL_SIZE: "1000"
      JAEGER_ENDPOINT: "jaeger:4318"
      SERVICE_NAME: "id-service"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - quantara-network
    restart: unless-stopped

  globalid-service:
    build:
      context: ./globalid-service
      dockerfile: Dockerfile
    container_name: quantara-globalid-service
    ports:
      - "50052:50052"
    environment:
      GRPC_PORT: "50052"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/quantara?sslmode=disable"
      GLOBALID_POOL_SIZE: "1000"
      JAEGER_ENDPOINT: "jaeger:4318"
      SERVICE_NAME: "globalid-service"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - quantara-network
    restart: unless-stopped

  lock-service:
    build:
      context: ./lock-service
      dockerfile: Dockerfile
    container_name: quantara-lock-service
    ports:
      - "50053:50053"
    environment:
      GRPC_PORT: "50053"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/quantara?sslmode=disable"
      JAEGER_ENDPOINT: "jaeger:4318"
      SERVICE_NAME: "lock-service"
      DEFAULT_TTL_MS: "10000"
      CLEANUP_INTERVAL: "3600000"  # 1 hour in ms
      MAX_DB_CONNECTIONS: "50"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - quantara-network
    restart: unless-stopped

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: quantara-transaction-service
    ports:
      - "50054:50054"
    environment:
      GRPC_PORT: "50054"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/quantara?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      DATADICTIONARY_URL: "http://datadictionary:8080"
      JAEGER_ENDPOINT: "jaeger:4318"
      SERVICE_NAME: "transaction-service"
      TX_TTL_SECONDS: "600"
      COMMIT_CHUNK_SIZE: "5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      datadictionary:
        condition: service_healthy
      datadictionary-seed:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    networks:
      - quantara-network
    restart: unless-stopped

  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: quantara-search-service
    ports:
      - "50055:50055"
    environment:
      GRPC_PORT: "50055"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/quantara?sslmode=disable"
      DB_SCHEMA: "murex"
      REDIS_URL: "redis://redis:6379/0"
      DATADICTIONARY_URL: "http://datadictionary:8080"
      SEARCH_FILTER_JSON_FIELD_ENABLED: "false"
      JAEGER_ENDPOINT: "jaeger:4318"
      SERVICE_NAME: "search-service"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      datadictionary:
        condition: service_healthy
      datadictionary-seed:
        condition: service_completed_successfully
      jaeger:
        condition: service_started
    networks:
      - quantara-network
    restart: unless-stopped

  # gRPC Web UI for testing
  grpcui-id:
    image: fullstorydev/grpcui:latest
    container_name: quantara-grpcui-id
    ports:
      - "8080:8080"
    command: ["-plaintext", "-bind", "0.0.0.0", "-port", "8080", "id-service:50051"]
    depends_on:
      - id-service
    networks:
      - quantara-network
    restart: unless-stopped

  grpcui-globalid:
    image: fullstorydev/grpcui:latest
    container_name: quantara-grpcui-globalid
    ports:
      - "8081:8080"
    command: ["-plaintext", "-bind", "0.0.0.0", "-port", "8080", "globalid-service:50052"]
    depends_on:
      - globalid-service
    networks:
      - quantara-network
    restart: unless-stopped

  grpcui-lock:
    image: fullstorydev/grpcui:latest
    container_name: quantara-grpcui-lock
    ports:
      - "8082:8080"
    command: ["-plaintext", "-bind", "0.0.0.0", "-port", "8080", "lock-service:50053"]
    depends_on:
      - lock-service
    networks:
      - quantara-network
    restart: unless-stopped

  grpcui-transaction:
    image: fullstorydev/grpcui:latest
    container_name: quantara-grpcui-transaction
    ports:
      - "8085:8080"
    command: ["-plaintext", "-bind", "0.0.0.0", "-port", "8080", "transaction-service:50054"]
    depends_on:
      - transaction-service
    networks:
      - quantara-network
    restart: unless-stopped

  grpcui-search:
    image: fullstorydev/grpcui:latest
    container_name: quantara-grpcui-search
    ports:
      - "8086:8080"
    command: ["-plaintext", "-bind", "0.0.0.0", "-port", "8080", "search-service:50055"]
    depends_on:
      - search-service
    networks:
      - quantara-network
    restart: unless-stopped

  # DataDictionary Service
  datadictionary:
    build:
      context: ./DataDictionary
      dockerfile: Dockerfile
    container_name: quantara-datadictionary
    ports:
      - "8083:8080"   # HTTP API
      - "9090:9090"   # gRPC
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datadictionary
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_LIQUIBASE_ENABLED: "true"
      SERVER_PORT: "8080"
      GRPC_SERVER_PORT: "9090"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - quantara-network
    restart: unless-stopped

  # DataDictionary seed loader (loads initial data if seed-data exists)
  datadictionary-seed:
    image: curlimages/curl:latest
    container_name: quantara-datadictionary-seed
    volumes:
      - ./DataDictionary/seed-data:/seed-data:ro
    depends_on:
      datadictionary:
        condition: service_healthy
    entrypoint: >
      sh -c '
        if [ ! -f /seed-data/metamodel-seed.json ]; then
          echo "No seed data found at /seed-data/metamodel-seed.json, skipping..."
          exit 0
        fi

        echo "Checking if data already exists..."
        RESPONSE=$$(curl -s http://datadictionary:8080/api/metamodel/export)
        CLASS_COUNT=$$(echo "$$RESPONSE" | grep -o "\"className\"" | wc -l)

        if [ "$$CLASS_COUNT" -gt 0 ]; then
          echo "Data already exists ($$CLASS_COUNT classes), skipping import"
        else
          echo "Loading seed data..."
          curl -X POST \
            -H "Content-Type: application/json" \
            -d @/seed-data/metamodel-seed.json \
            "http://datadictionary:8080/api/metamodel/import?mode=REPLACE"
          echo ""
          echo "Seed data loaded!"
        fi

        echo ""
        echo "Creating database tables from metamodel..."
        curl -f -X POST http://datadictionary:8080/database/api/schema/apply
        echo ""
        echo "Database tables created!"
      '
    networks:
      - quantara-network
    restart: "no"

  grpcui-datadictionary:
    image: fullstorydev/grpcui:latest
    container_name: quantara-grpcui-datadictionary
    ports:
      - "8084:8080"
    command: ["-plaintext", "-bind", "0.0.0.0", "-port", "8080", "datadictionary:9090"]
    depends_on:
      - datadictionary
    networks:
      - quantara-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  quantara-network:
    driver: bridge
